[project]
name = "livekit-agent"
version = "0.1.0"
description = "A professional voice agent built with LiveKit"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "livekit-agents[silero,turn-detector]~=1.5",
    "livekit-plugins-openai~=1.5",
    "livekit-plugins-assemblyai~=1.5",
    "livekit-plugins-cartesia~=1.5",
    "python-dotenv",
    "flask>=3.1.3",
    "livekit-api>=1.1.0",
]

[tool.setuptools]
py-modules = []
packages = []

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"
