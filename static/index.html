<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveKit Agent Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --accent-color: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(79, 70, 229, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(79, 70, 229, 0.05) 0%, transparent 40%);
        }

        h1, h2, h3 {
            font-family: 'Outfit', sans-serif;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Header */
        header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-color), #818cf8);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid var(--glass-border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
        }

        .status-dot.active {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Chat Area */
        .chat-content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--glass-border) transparent;
        }

        .chat-content::-webkit-scrollbar {
            width: 6px;
        }

        .chat-content::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.agent {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--glass-border);
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent-color);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        .message.system {
            align-self: center;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-style: italic;
        }

        /* Transcription Interims */
        .transcript-interim {
            font-style: italic;
            opacity: 0.7;
        }

        /* Controls */
        .controls {
            padding: 24px 32px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 20px;
        }

        .btn:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn.primary {
            background: var(--accent-color);
            border: none;
            width: auto;
            padding: 0 32px;
            border-radius: 28px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn.primary:hover {
            box-shadow: 0 4px 25px var(--accent-glow);
        }

        .btn.active {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Visualizers */
        .visualizer-container {
            position: absolute;
            bottom: 104px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 4px;
            height: 40px;
        }

        .bar {
            width: 3px;
            height: 4px;
            background: var(--accent-color);
            border-radius: 2px;
            transition: height 0.1s ease;
        }

        /* Speaking Indicator */
        .speaking-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .wave {
            display: flex;
            gap: 2px;
        }

        .wave div {
            width: 2px;
            height: 10px;
            background: var(--accent-color);
            animation: wave 1.2s infinite;
        }

        .wave div:nth-child(2) { animation-delay: 0.2s; }
        .wave div:nth-child(3) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { height: 4px; }
            50% { height: 12px; }
        }

        .hidden {
            display: none !important;
        }

        /* Test Panel & Tabs */
        .test-panel {
            padding: 24px;
            border-top: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.4);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .panel-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 12px;
            gap: 4px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 6px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
        }

        .tab-content.active {
            display: block;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"], textarea {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        textarea {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        #payload-raw {
            font-family: 'JetBrains Mono', monospace;
            color: #10b981;
            font-size: 0.85rem;
            margin-bottom: 12px;
            width: 100%;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .helper-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .mt-4 { margin-top: 16px; }
        .mb-4 { margin-bottom: 16px; }

        .btn.secondary {
            background: rgba(255, 255, 255, 0.05);
            width: auto;
            height: auto;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .full-width {
            width: 100% !important;
        }
    </style>




</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                </div>
                <h3>LiveKit Pro Agent</h3>
            </div>
            <div class="status-badge">
                <div id="status-dot" class="status-dot"></div>
                <span id="status-text">Disconnected</span>
            </div>
        </header>

        <div id="chat-content" class="chat-content">
            <div class="message system">Welcome to the LiveKit Agent Interface. Click Connect to start.</div>
        </div>

        <div id="visualizer" class="visualizer-container hidden">
            <!-- Bars will be added dynamically or just stay static for now -->
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <div id="test-panel" class="test-panel">
            <div class="panel-header">
                <h4>Manual Test Console</h4>
                <div class="panel-tabs">
                    <button class="tab-btn active" data-tab="structured">Structured</button>
                    <button class="tab-btn" data-tab="raw">Raw JSON</button>
                </div>
            </div>

            <!-- Structured Input Tab -->
            <div id="tab-structured" class="tab-content active">
                <div class="input-grid">
                    <div class="field">
                        <label>Client Name</label>
                        <input type="text" id="input-client-name" placeholder="e.g. John Doe">
                    </div>
                    <div class="field">
                        <label>Call ID</label>
                        <input type="text" id="input-call-id" placeholder="e.g. 88752">
                    </div>
                    <div class="field">
                        <label>Lead ID</label>
                        <input type="text" id="input-lead-id" placeholder="e.g. 46093">
                    </div>
                </div>
                <div class="field mt-4">
                    <label>Agent Instructions (Prompt)</label>
                    <textarea id="input-prompt" rows="10" placeholder="Paste the system prompt here..."></textarea>
                </div>
            </div>

            <!-- Raw JSON Tab -->
            <div id="tab-raw" class="tab-content">
                <p class="helper-text">Paste a raw JSON payload from your logs here and click "Parse" to populate the fields.</p>
                <textarea id="payload-raw" rows="14" placeholder='{ "call_id": 123, ... }'></textarea>
                <button id="parse-raw-btn" class="btn secondary mb-4">Parse & Populate Fields</button>
            </div>

            <button id="start-session-btn" class="btn primary full-width mt-4">Start Test Session</button>
        </div>


        <div class="controls">
            <button id="mic-btn" class="btn hidden" title="Toggle Microphone">
                <svg id="mic-on" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                <svg id="mic-off" class="hidden" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" x2="23" y1="1" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V5a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
            </button>
            <button id="disconnect-btn" class="btn active hidden" title="Disconnect">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-6.13-6.14 19.8 19.8 0 0 1-3.07-8.67A2 2 0 0 1 4.11 3h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/><line x1="23" x2="1" y1="1" y2="23"/></svg>
            </button>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
