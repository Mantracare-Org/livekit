<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveKit Agent Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;

            --bg-page:           #1e1f22;
            --bg-surface:        #2b2d31;
            --bg-elevated:       #313338;
            --bg-hover:          #35373c;
            --bg-input:          #1e1f22;

            --border-default:    #3f4148;
            --border-strong:     #4e5058;
            --border-accent:     #5865F2;

            --text-primary:      #f2f3f5;
            --text-secondary:    #949ba4;
            --text-tertiary:     #6d6f78;

            --accent:            #5865F2;
            --accent-hover:      #4752c4;
            --accent-subtle:     rgba(88, 101, 242, 0.12);

            --success:           #23a55a;
            --success-subtle:    rgba(35, 165, 90, 0.12);
            --danger:            #da373c;
            --danger-subtle:     rgba(218, 55, 60, 0.12);

            --shadow-sm:         0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md:         0 4px 12px rgba(0, 0, 0, 0.4);

            --text-xs:   0.75rem;
            --text-sm:   0.8125rem;
            --text-base: 0.875rem;
            --text-lg:   1rem;
            --text-xl:   1.25rem;

            --weight-regular: 400;
            --weight-medium:  500;
            --weight-semibold: 600;

            --tracking-normal: 0em;
            --tracking-wide:   0.02em;
            --tracking-mono:  -0.01em;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            font-size: var(--text-base);
            background: var(--bg-page);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-active, #3f4148); border-radius: 3px; }
        * { scrollbar-width: thin; scrollbar-color: var(--bg-active, #3f4148) transparent; }

        :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

        .container {
            width: 100%;
            max-width: 900px;
            height: 85vh;
            background: var(--bg-surface);
            border: 1px solid var(--border-default);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-md);
        }

        header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-default);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { display: flex; align-items: center; gap: 10px; }

        .logo-icon {
            width: 28px; height: 28px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .logo-icon svg { width: 16px; height: 16px; color: white; }

        .nav-title { font-size: var(--text-lg); font-weight: var(--weight-semibold); color: var(--text-primary); }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: var(--bg-elevated);
            border-radius: 6px;
            font-size: var(--text-sm);
            border: 1px solid var(--border-default);
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--text-tertiary);
        }

        .status-dot.active {
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .chat-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-default) transparent;
        }

        .chat-content::-webkit-scrollbar { width: 6px; }
        .chat-content::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 3px; }

        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: var(--text-sm);
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.agent {
            align-self: flex-start;
            background: var(--bg-elevated);
            border: 1px solid var(--border-default);
            border-bottom-left-radius: 2px;
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.system {
            align-self: center;
            background: transparent;
            color: var(--text-secondary);
            font-size: var(--text-xs);
            font-style: italic;
        }

        .controls {
            padding: 16px 24px;
            border-top: 1px solid var(--border-default);
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border-default);
            color: var(--text-primary);
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 18px;
        }

        .btn:hover { background: var(--bg-hover); border-color: var(--border-strong); }

        .btn.primary {
            background: var(--accent);
            border: 1px solid var(--accent);
            width: auto;
            padding: 0 24px;
            border-radius: 6px;
            font-weight: var(--weight-medium);
            font-size: var(--text-sm);
            color: white;
        }

        .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

        .btn.active {
            background: var(--danger-subtle);
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .hidden { display: none !important; }

        .test-panel {
            padding: 20px;
            border-top: 1px solid var(--border-default);
            background: var(--bg-page);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .panel-header h4 { font-weight: var(--weight-semibold); font-size: var(--text-base); }

        .panel-tabs {
            display: flex;
            background: var(--bg-elevated);
            padding: 3px;
            border-radius: 6px;
            gap: 2px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: var(--text-xs);
            font-weight: var(--weight-medium);
            font-family: var(--font-sans);
            transition: all 0.15s ease;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
        }

        .tab-content { display: none; flex: 1; overflow-y: auto; }
        .tab-content.active { display: block; }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: var(--text-xs);
            color: var(--text-secondary);
            font-weight: var(--weight-semibold);
            text-transform: uppercase;
            letter-spacing: var(--tracking-wide);
        }

        input[type="text"], textarea {
            background: var(--bg-input);
            border: 1px solid var(--border-default);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: var(--text-sm);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        textarea { font-family: var(--font-sans); line-height: 1.6; }

        #payload-raw {
            font-family: var(--font-mono);
            color: var(--success);
            font-size: var(--text-xs);
            margin-bottom: 12px;
            width: 100%;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--border-accent);
            box-shadow: 0 0 0 3px var(--accent-subtle);
        }

        .helper-text {
            font-size: var(--text-xs);
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .mt-4 { margin-top: 12px; }
        .mb-4 { margin-bottom: 12px; }

        .btn.secondary {
            background: transparent;
            width: auto;
            height: auto;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: var(--text-xs);
            border: 1px solid var(--border-default);
            color: var(--text-secondary);
            font-family: var(--font-sans);
        }

        .btn.secondary:hover { background: var(--bg-hover); color: var(--text-primary); }

        .full-width { width: 100% !important; }
    </style>




</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                </div>
                <span class="nav-title">MantraAssist</span>
                <div class="console-nav">
                    <a href="/dashboard">Dashboard</a>
                    <a href="/console" class="active">Test Console</a>
                    <a href="/kb-chat">KB Chat</a>
                </div>
            </div>
            <div class="status-badge">
                <div id="status-dot" class="status-dot"></div>
                <span id="status-text">Disconnected</span>
            </div>
        </header>

        <div id="chat-content" class="chat-content">
            <div class="message system">Welcome to the LiveKit Agent Interface. Click Connect to start.</div>
        </div>

        <div id="visualizer" class="visualizer-container hidden">
            <!-- Bars will be added dynamically or just stay static for now -->
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <div id="test-panel" class="test-panel">
            <div class="panel-header">
                <h4>Manual Test Console</h4>
                <div class="panel-tabs">
                    <button class="tab-btn active" data-tab="structured">Structured</button>
                    <button class="tab-btn" data-tab="raw">Raw JSON</button>
                </div>
            </div>

            <!-- Structured Input Tab -->
            <div id="tab-structured" class="tab-content active">
                <div class="input-grid">
                    <div class="field">
                        <label>Client Name</label>
                        <input type="text" id="input-client-name" placeholder="e.g. John Doe">
                    </div>
                    <div class="field">
                        <label>Call ID</label>
                        <input type="text" id="input-call-id" placeholder="e.g. 88752">
                    </div>
                    <div class="field">
                        <label>Lead ID</label>
                        <input type="text" id="input-lead-id" placeholder="e.g. 46093">
                    </div>
                    <div class="field">
                        <label>Knowledge Base ID (Optional)</label>
                        <select id="input-kb-id">
                            <option value="">None (No KB context)</option>
                        </select>
                    </div>
                </div>
                <div class="field mt-4">
                    <label>Agent Instructions (Prompt)</label>
                    <textarea id="input-prompt" rows="10" placeholder="Paste the system prompt here..."></textarea>
                </div>
            </div>

            <!-- Raw JSON Tab -->
            <div id="tab-raw" class="tab-content">
                <p class="helper-text">Paste a raw JSON payload from your logs here and click "Parse" to populate the fields.</p>
                <textarea id="payload-raw" rows="14" placeholder='{ "call_id": 123, ... }'></textarea>
                <button id="parse-raw-btn" class="btn secondary mb-4">Parse & Populate Fields</button>
            </div>

            <button id="start-session-btn" class="btn primary full-width mt-4">Start Test Session</button>
        </div>


        <div class="controls">
            <button id="mic-btn" class="btn hidden" title="Toggle Microphone">
                <svg id="mic-on" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                <svg id="mic-off" class="hidden" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" x2="23" y1="1" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V5a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
            </button>
            <button id="disconnect-btn" class="btn active hidden" title="Disconnect">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-6.13-6.14 19.8 19.8 0 0 1-3.07-8.67A2 2 0 0 1 4.11 3h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/><line x1="23" x2="1" y1="1" y2="23"/></svg>
            </button>
        </div>

    </div>

    <style>
        .console-nav { display: flex; align-items: center; gap: 2px; }
        .console-nav a {
            padding: 6px 14px;
            border-radius: 6px;
            background: transparent;
            color: var(--text-secondary);
            font-family: var(--font-sans);
            font-size: var(--text-sm);
            font-weight: var(--weight-medium);
            text-decoration: none;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .console-nav a:hover { background: var(--bg-hover); color: var(--text-primary); }
        .console-nav a.active { background: var(--accent); color: white; }
    </style>
    <script>
        // Redirect to login if not authenticated
        if (!localStorage.getItem('token')) {
            window.location.href = '/';
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
